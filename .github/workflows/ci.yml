# CI — build e testes sem segredos em repositório.
# OIDC: `id-token: write` permite `google-github-actions/auth` + Workload Identity (GCP)
# quando existir job de deploy; ver docs/security/secrets-gcp-tilt-ci.md

name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  id-token: write

jobs:
  rust-worker:
    name: Rust (mlms-worker)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"

      - name: fmt
        run: cargo fmt --all -- --check

      - name: clippy
        run: cargo clippy -p mlms-worker --all-targets -- -D warnings

      - name: test
        run: cargo test -p mlms-worker

  web:
    name: Vue (projeto-web)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: projeto-web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: projeto-web/package-lock.json

      - name: Install and build
        run: |
          npm ci
          npm run build

  docker-smoke:
    name: Docker (smoke build, main)
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build imagem mlms-worker
        run: docker build -f services/mlms-worker/Dockerfile -t mlms-worker:ci .

      - name: Build imagem web (nginx)
        run: docker build -f projeto-web/Dockerfile -t mlms-web:ci projeto-web
