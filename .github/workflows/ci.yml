# CI — build e testes sem segredos em repositório.
# OIDC: `id-token: write` permite `google-github-actions/auth` + Workload Identity (GCP)
# quando existir job de deploy; ver docs/security/secrets-gcp-tilt-ci.md

name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  id-token: write

jobs:
  rust-worker:
    name: Rust (mlms-worker)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"

      - name: fmt
        run: cargo fmt --all -- --check

      - name: clippy
        run: cargo clippy -p mlms-worker --all-targets -- -D warnings

      - name: test
        run: cargo test -p mlms-worker

  web:
    name: Vue (mlms-spa)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/mlms-spa
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: services/mlms-spa/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck (vue-tsc)
        run: npm run typecheck

      - name: Production build (Vite)
        run: npx vite build

  nest-api:
    name: Nest (mlms-api)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/mlms-api
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: services/mlms-api/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

  docker-smoke:
    name: Docker (smoke build, main)
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build imagem mlms-worker
        run: docker build -f services/mlms-worker/Dockerfile -t mlms-worker:ci .

      - name: Build imagem web (nginx)
        run: docker build -f services/mlms-spa/Dockerfile -t mlms-web:ci services/mlms-spa
